<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frozen Funds — A Royal Reputation Crisis</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ice: #a8d8ea;
  --ice-light: #d6eef7;
  --ice-dark: #4a9ebb;
  --night: #07111f;
  --night-mid: #0d1e33;
  --night-deep: #040c18;
  --gold: #c9a84c;
  --text-primary: #e8f4f8;
  --text-secondary: rgba(200,230,245,0.7);
  --text-muted: rgba(150,200,225,0.45);
  --border: rgba(168,216,234,0.15);
  --border-strong: rgba(168,216,234,0.3);
  --card-bg: rgba(13,30,51,0.75);
  --card-bg-hover: rgba(20,45,75,0.85);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--night-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 1.5rem 4rem}
#splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1rem}
.splash-snowflake{width:80px;height:80px;margin:0 auto 2rem;animation:spin 30s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.splash-eyebrow{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--ice-dark);margin-bottom:1rem}
.splash-title{font-family:'Cinzel',serif;font-size:clamp(2.8rem,8vw,5rem);font-weight:700;line-height:1.05;color:var(--ice-light);text-shadow:0 0 60px rgba(168,216,234,0.3);margin-bottom:.5rem}
.splash-subtitle{font-family:'Cinzel',serif;font-size:clamp(1rem,3vw,1.5rem);font-weight:400;color:var(--gold);letter-spacing:.05em;margin-bottom:2rem}
.splash-desc{font-size:1.1rem;color:var(--text-secondary);line-height:1.8;max-width:460px;margin:0 auto 2.5rem;font-style:italic}
.splash-cast{display:flex;gap:1rem;justify-content:center;margin-bottom:3rem;flex-wrap:wrap}
.cast-chip{display:flex;align-items:center;gap:10px;background:var(--card-bg);border:1px solid var(--border);border-radius:99px;padding:.4rem 1rem .4rem .4rem}
.cast-portrait{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;border:1px solid var(--border-strong)}
.cast-portrait svg{width:100%;height:100%}
.cast-name{font-family:'Inter',sans-serif;font-size:12px;color:var(--text-secondary)}
.play-btn{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;letter-spacing:.15em;color:var(--night-deep);background:var(--ice-light);border:none;border-radius:4px;padding:1rem 3rem;cursor:pointer;transition:background .2s,transform .15s;text-transform:uppercase}
.play-btn:hover{background:#fff;transform:scale(1.02)}
.play-btn:active{transform:scale(0.98)}
#game-screen{display:none;padding-top:2rem}
.progress-wrap{position:sticky;top:0;z-index:100;background:rgba(4,12,24,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;margin:0 -1.5rem 2rem;display:flex;align-items:center;gap:1rem}
.progress-label{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;flex-shrink:0}
.progress-track{flex:1;height:2px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--ice);border-radius:99px;transition:width .6s ease}
.progress-pct{font-family:'Inter',sans-serif;font-size:11px;color:var(--ice);flex-shrink:0;min-width:28px;text-align:right}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:2rem}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:.85rem 1rem;text-align:center;transition:border-color .2s}
.stat-card:hover{border-color:var(--border-strong)}
.stat-val{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:600;color:var(--ice-light);line-height:1;margin-bottom:.3rem}
.stat-label{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.stat-bar{height:2px;background:var(--border);border-radius:99px;margin-top:.5rem;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:99px;transition:width .7s ease}
.scene-canvas{width:100%;height:260px;border-radius:12px;overflow:hidden;margin-bottom:1.5rem;position:relative;border:1px solid var(--border)}
.scene-canvas svg{width:100%;height:100%}
.scene-overlay{position:absolute;bottom:0;left:0;right:0;padding:1.25rem 1.5rem;background:linear-gradient(to top,rgba(4,12,24,0.95) 0%,transparent 100%)}
.scene-badge{font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--ice-dark);margin-bottom:.4rem}
.scene-title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:700;color:var(--ice-light);line-height:1.2}
.news-ticker{background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.35);border-radius:6px;padding:.65rem 1rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem}
.ticker-dot{width:7px;height:7px;border-radius:50%;background:#e74c3c;flex-shrink:0;animation:pulse 1.1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ticker-label{font-family:'Inter',sans-serif;font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#e74c3c;flex-shrink:0}
.ticker-text{font-size:.9rem;color:rgba(220,180,170,.85);line-height:1.4}
.dialogue-section{margin-bottom:1.75rem}
.bubble-wrap{display:flex;align-items:flex-end;gap:.75rem;margin-bottom:.85rem;animation:slideIn .35s ease both}
.bubble-wrap.right{flex-direction:row-reverse}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.char-portrait{width:44px;height:44px;border-radius:50%;flex-shrink:0;overflow:hidden;border:1px solid var(--border-strong)}
.char-portrait svg{width:100%;height:100%;display:block}
.char-name{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px}
.char-name.right-name{text-align:right}
.speech-bubble{max-width:80%;background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:.7rem 1rem;font-size:1rem;color:var(--text-secondary);line-height:1.6}
.speech-bubble.olaf-bubble{background:rgba(26,140,96,0.12);border-color:rgba(26,140,96,0.3);color:rgba(180,235,210,.9)}
.choices-header{font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;display:flex;align-items:center;gap:.75rem}
.choices-header::after{content:'';flex:1;height:1px;background:var(--border)}
.choice-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:.75rem;cursor:pointer;transition:background .2s,border-color .2s,transform .15s;display:flex;gap:1rem;align-items:flex-start}
.choice-card:hover{background:var(--card-bg-hover);border-color:var(--border-strong);transform:translateY(-1px)}
.choice-card:active{transform:translateY(0) scale(0.99)}
.choice-num{font-family:'Cinzel',serif;font-size:.8rem;font-weight:700;color:var(--ice-dark);min-width:20px;padding-top:2px}
.choice-inner{flex:1}
.choice-title{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:600;color:var(--ice-light);margin-bottom:.3rem}
.choice-desc{font-size:.95rem;color:var(--text-secondary);line-height:1.6}
.consequence-panel{background:rgba(20,40,65,0.6);border:1px solid var(--border-strong);border-radius:10px;padding:1.25rem;margin-bottom:1.25rem;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.cp-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--ice-light);margin-bottom:.2rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.cp-subtitle{font-family:'Inter',sans-serif;font-size:.8rem;color:var(--text-muted);margin-bottom:1rem}
.trust-delta-badge{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px}
.d-pos{background:rgba(78,201,154,.15);color:#4ec99a;border:1px solid rgba(78,201,154,.3)}
.d-neg{background:rgba(224,112,112,.15);color:#e07070;border:1px solid rgba(224,112,112,.3)}
.d-neu{background:rgba(232,163,58,.15);color:#e8a33a;border:1px solid rgba(232,163,58,.3)}
.con-item{display:flex;align-items:flex-start;gap:.65rem;margin-bottom:.6rem;font-size:.95rem;color:var(--text-secondary);line-height:1.5}
.con-icon{width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.con-dot{width:6px;height:6px;border-radius:50%}
.ci-good{background:rgba(78,201,154,.18)}.ci-warn{background:rgba(232,163,58,.18)}.ci-bad{background:rgba(224,112,112,.18)}
.cd-good{background:#4ec99a}.cd-warn{background:#e8a33a}.cd-bad{background:#e07070}
.rune-divider{text-align:center;margin:1.25rem 0;color:var(--text-muted);font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.3em;display:flex;align-items:center;gap:1rem}
.rune-divider::before,.rune-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.next-btn{width:100%;padding:1rem;background:transparent;border:1px solid var(--border-strong);border-radius:8px;font-family:'Cinzel',serif;font-size:.9rem;font-weight:600;letter-spacing:.1em;color:var(--ice);cursor:pointer;transition:background .2s,border-color .2s,color .2s;margin-top:.5rem}
.next-btn:hover{background:rgba(168,216,234,.08);border-color:var(--ice);color:var(--ice-light)}
#ending-screen{display:none;padding-top:2rem}
.ending-hero{text-align:center;padding:3rem 1.5rem 2rem;border:1px solid var(--border);border-radius:12px;background:var(--card-bg);margin-bottom:1.5rem;position:relative;overflow:hidden}
.ending-glow{position:absolute;inset:0;pointer-events:none;opacity:.12}
.ending-icon-wrap{width:100px;height:100px;margin:0 auto 1.5rem}
.ending-eyebrow{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.25em;text-transform:uppercase;margin-bottom:.75rem}
.ending-title{font-family:'Cinzel',serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;color:var(--ice-light);line-height:1.15;margin-bottom:1rem}
.ending-lede{font-size:1.05rem;color:var(--text-secondary);line-height:1.8;max-width:520px;margin:0 auto;font-style:italic}
.ending-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:1.5rem 0 0}
.ending-stat{background:rgba(7,17,31,0.5);border:1px solid var(--border);border-radius:8px;padding:.9rem .5rem;text-align:center}
.es-val{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:700;line-height:1;margin-bottom:.3rem}
.es-label{font-family:'Inter',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
.section-heading{font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;display:flex;align-items:center;gap:.75rem}
.section-heading::after{content:'';flex:1;height:1px;background:var(--border)}
.timeline{margin-bottom:1.5rem}
.tl-item{display:flex;gap:.9rem;align-items:flex-start;margin-bottom:1rem}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tl-line{width:1px;flex:1;min-height:20px;background:var(--border);margin-top:4px}
.tl-body{flex:1}
.tl-scene-label{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:2px}
.tl-choice-name{font-family:'Cinzel',serif;font-size:.9rem;font-weight:600;color:var(--ice-light);margin-bottom:2px}
.tl-impact{font-family:'Inter',sans-serif;font-size:.8rem;color:var(--text-secondary)}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1rem}
.action-btn{padding:.85rem;background:transparent;border:1px solid var(--border-strong);border-radius:8px;font-family:'Cinzel',serif;font-size:.8rem;font-weight:600;letter-spacing:.06em;color:var(--ice);cursor:pointer;text-align:center;transition:background .2s,border-color .2s}
.action-btn:hover{background:rgba(168,216,234,.08);border-color:var(--ice)}
.action-btn.primary{background:var(--ice-light);border-color:var(--ice-light);color:var(--night-deep);font-weight:700}
.action-btn.primary:hover{background:#fff;border-color:#fff}
@media(max-width:520px){.stats-row{gap:.5rem}.stat-val{font-size:1.2rem}.ending-stats{gap:.5rem}.action-row{grid-template-columns:1fr}}
.anim-in{animation:fadeUp .4s ease both}
.anim-delay-1{animation-delay:.05s}
.anim-delay-2{animation-delay:.1s}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="app">

<div id="splash">
  <svg class="splash-snowflake" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#a8d8ea" stroke-width="1.5" fill="none" opacity=".9">
      <line x1="40" y1="4" x2="40" y2="76"/><line x1="4" y1="40" x2="76" y2="40"/>
      <line x1="11" y1="11" x2="69" y2="69"/><line x1="69" y1="11" x2="11" y2="69"/>
      <circle cx="40" cy="4" r="2.5" fill="#a8d8ea"/><circle cx="40" cy="76" r="2.5" fill="#a8d8ea"/>
      <circle cx="4" cy="40" r="2.5" fill="#a8d8ea"/><circle cx="76" cy="40" r="2.5" fill="#a8d8ea"/>
      <circle cx="11" cy="11" r="2.5" fill="#a8d8ea"/><circle cx="69" cy="69" r="2.5" fill="#a8d8ea"/>
      <circle cx="69" cy="11" r="2.5" fill="#a8d8ea"/><circle cx="11" cy="69" r="2.5" fill="#a8d8ea"/>
      <circle cx="40" cy="18" r="3" fill="#a8d8ea"/><circle cx="40" cy="62" r="3" fill="#a8d8ea"/>
      <circle cx="18" cy="40" r="3" fill="#a8d8ea"/><circle cx="62" cy="40" r="3" fill="#a8d8ea"/>
      <circle cx="40" cy="40" r="6" fill="#4a9ebb" stroke="#a8d8ea"/>
    </g>
  </svg>
  <div class="splash-eyebrow">Episode Interactive Story</div>
  <h1 class="splash-title">Frozen Funds</h1>
  <p class="splash-subtitle">A Royal Reputation Crisis</p>
  <p class="splash-desc">A leaked royal ledger has implicated Princess Anna in financial fraud. Queen Elsa is away. You are Olaf — and the fate of the crown rests on your decisions.</p>
  <div class="splash-cast" id="splash-cast-row"></div>
  <button class="play-btn" onclick="startGame()">Begin the Story</button>
</div>

<div id="game-screen">
  <div class="progress-wrap">
    <span class="progress-label">Kingdom reputation</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <span class="progress-pct" id="progress-pct">0%</span>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="stat-trust">50%</div><div class="stat-label">Trust</div><div class="stat-bar"><div class="stat-bar-fill" id="bar-trust" style="width:50%;background:#4ec99a"></div></div></div>
    <div class="stat-card"><div class="stat-val" id="stat-diplomacy">50%</div><div class="stat-label">Diplomacy</div><div class="stat-bar"><div class="stat-bar-fill" id="bar-diplomacy" style="width:50%;background:#7c5cbf"></div></div></div>
    <div class="stat-card"><div class="stat-val" id="stat-morale">50%</div><div class="stat-label">Morale</div><div class="stat-bar"><div class="stat-bar-fill" id="bar-morale" style="width:50%;background:#c9a84c"></div></div></div>
  </div>
  <div id="scene-content"></div>
</div>

<div id="ending-screen"></div>
</div>

<script>
/* ── PORTRAITS ── */
const PORTRAITS = {
  olaf: `<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">

  merchant: `<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="22" fill="#0d1e3a"/>

    <circle cx="19" cy="15.5" r=".6" fill="#fff"/>
    <circle cx="26" cy="15.5" r=".6" fill="#fff"/>
    <path d="M19 21 Q22 23.5 25 21" stroke="#7a4a2a" stroke-width=".8" fill="none" stroke-linecap="round"/>
    <ellipse cx="22" cy="10" rx="9" ry="5" fill="#2a4a6a"/>

    <path d="M12 29 Q22 37 32 29" fill="#2a4a6a" opacity=".8"/>
    <ellipse cx="22" cy="30" rx="6" ry="2" fill="#1a3a5a" opacity=".5"/>
  </svg>`,
  palace: `<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="22" fill="#2a0a0a"/>
    <ellipse cx="22" cy="28" rx="10" ry="8" fill="#c07a6a"/>
    <ellipse cx="22" cy="17" rx="8" ry="8.5" fill="#c07a6a"/>
    <circle cx="18.5" cy="16.5" r="1.8" fill="#2a0a0a"/>
    <circle cx="25.5" cy="16.5" r="1.8" fill="#2a0a0a"/>
    <circle cx="19" cy="16" r=".6" fill="#fff"/>
    <circle cx="26" cy="16" r=".6" fill="#fff"/>
    <path d="M19 21.5 Q22 24 25 21.5" stroke="#7a3a2a" stroke-width=".8" fill="none" stroke-linecap="round"/>
    <path d="M14 11 Q18 7 22 9 Q26 7 30 11 L28 15 Q22 11 16 15Z" fill="#8b2a2a"/>
    <path d="M13 29 Q22 37 31 29" fill="#8b2a2a" opacity=".7"/>
  </svg>`,
  bard: `<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="22" fill="#1a1a0a"/>

/* ── CANVAS BACKGROUND ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, stars=[], flakes=[], auroras=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
function initParticles(){
  stars=Array.from({length:160},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,a:Math.random(),speed:Math.random()*.004+.001}));
  flakes=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.5+.8,vx:(Math.random()-.5)*.3,vy:Math.random()*.6+.2,a:Math.random()*.7+.3}));
  auroras=[{color:'rgba(29,184,138,',pts:[]},{color:'rgba(58,127,213,',pts:[]},{color:'rgba(124,92,191,',pts:[]}];
  auroras.forEach((a,i)=>{a.pts=Array.from({length:6},(_,j)=>({x:(j/5)*W,y:(0.15+i*.08+Math.random()*.06)*H,oy:(0.15+i*.08+Math.random()*.06)*H,phase:Math.random()*Math.PI*2}))});
}
function drawFrame(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#040c18';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{s.a+=s.speed;const al=.4+.5*Math.abs(Math.sin(s.a));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(168,216,234,${al})`;ctx.fill()});
  auroras.forEach((a,i)=>{
    a.pts.forEach(p=>{p.phase+=.003+i*.001;p.y=p.oy+Math.sin(p.phase)*H*.04});
    for(let w=0;w<3;w++){ctx.beginPath();ctx.moveTo(a.pts[0].x,a.pts[0].y+w*18);for(let j=1;j<a.pts.length;j++){const pv=a.pts[j-1],cu=a.pts[j],mx=(pv.x+cu.x)/2,my=(pv.y+cu.y)/2+w*18;ctx.quadraticCurveTo(pv.x,pv.y+w*18,mx,my)}ctx.strokeStyle=a.color+(0.05-w*.012)+')';ctx.lineWidth=22-w*6;ctx.stroke()}
  });
  flakes.forEach(f=>{f.x+=f.vx;f.y+=f.vy;if(f.y>H+10){f.y=-10;f.x=Math.random()*W}if(f.x<-10)f.x=W+10;if(f.x>W+10)f.x=-10;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,240,250,${f.a})`;ctx.fill()});
  requestAnimationFrame(drawFrame);
}
window.addEventListener('resize',()=>{resize();initParticles()});
resize();initParticles();drawFrame();

      <div>
        <div class="char-name ${isRight?"right-name":""}">${d.char}</div>
        <div class="speech-bubble ${d.olaf?"olaf-bubble":""}">${d.text}</div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  if(G.consequence===null){
    html+=`<div class="choices-header anim-in anim-delay-2">Your decision as Olaf</div>`;
    sc.choices.forEach((c,i)=>{
      html+=`<div class="choice-card anim-in" style="animation-delay:${.15+i*.06}s" onclick="choose(${i})">
        <div class="choice-num">0${i+1}</div>
        <div class="choice-inner">
          <div class="choice-title">${c.title}</div>
          <div class="choice-desc">${c.desc}</div>
        </div>
      </div>`;
    });
  } else {
    const c=sc.choices[G.consequence];const dt=c.trust;
    html+=`<div class="consequence-panel">
      <div class="cp-title">${c.title}<span class="trust-delta-badge ${dt>0?"d-pos":dt<0?"d-neg":"d-neu"}">${dt>0?"+":""}${dt} trust</span></div>
      <div class="cp-subtitle">Consequences of your decision</div>
      ${c.consequences.map(x=>`<div class="con-item"><div class="con-icon ci-${x.type}"><div class="con-dot cd-${x.type}"></div></div><span>${x.text}</span></div>`).join('')}
    </div>`;
    if(c.reaction){
      html+=`<div class="rune-divider">Response</div>`;
      html+=`<div class="dialogue-section"><div class="bubble-wrap ${c.reaction.olaf?"right":""}">
        ${PORTRAITS[c.reaction.portraitKey]?`<div class="char-portrait">${PORTRAITS[c.reaction.portraitKey]}</div>`:''}
        <div>
          <div class="char-name ${c.reaction.olaf?"right-name":""}">${c.reaction.char}</div>
          <div class="speech-bubble ${c.reaction.olaf?"olaf-bubble":""}">${c.reaction.text}</div>
        </div>
      </div></div>`;
    }
    html+=`<button class="next-btn" onclick="advance()">${G.scene===SCENES.length-1?"Reveal your ending →":"Continue →"}</button>`;
  }
  html+=`</div>`;
  document.getElementById('scene-content').innerHTML=html;
  updateStats();
}

function choose(idx){
  const c=SCENES[G.scene].choices[idx];
  G.trust=clamp(G.trust+c.trust);G.diplomacy=clamp(G.diplomacy+c.diplomacy);G.morale=clamp(G.morale+c.morale);
  G.chosen.push({scene:G.scene,choice:idx,title:c.title,trust:c.trust});
  G.consequence=idx;renderScene();
}

function advance(){
  G.scene++;G.consequence=null;
  if(G.scene>=SCENES.length){renderEnding();return}
  renderScene();
}

function renderEnding(){
  document.getElementById('game-screen').style.display='none';
  const type=G.trust>=75?"best":G.trust>=50?"mid":"low";
  const e=ENDINGS[type];
  const el=document.getElementById('ending-screen');el.style.display='block';
  let tl='';
  G.chosen.forEach((ch,i)=>{
    const sn=["Scene 1","Scene 2","Final Scene"][ch.scene];const isLast=i===G.chosen.length-1;
    tl+=`<div class="tl-item"><div class="tl-dot-col"><div class="tl-dot" style="background:${ch.trust>0?"#4ec99a":ch.trust<0?"#e07070":"#e8a33a"}"></div>${!isLast?`<div class="tl-line"></div>`:""}</div>
      <div class="tl-body"><div class="tl-scene-label">${sn}</div><div class="tl-choice-name">${ch.title}</div><div class="tl-impact" style="color:${ch.trust>0?"#4ec99a":ch.trust<0?"#e07070":"#e8a33a"}">${ch.trust>0?"+":""}${ch.trust} trust</div></div></div>`;
  });
  el.innerHTML=`<div class="anim-in">
    <div class="ending-hero">
      <div class="ending-glow" style="background:radial-gradient(ellipse at center,${e.glowColor} 0%,transparent 70%)"></div>
      <div class="ending-icon-wrap">${endingSVG(e.svgType)}</div>
      <div class="ending-eyebrow" style="color:${e.eyebrowColor}">${e.eyebrow}</div>
      <h2 class="ending-title">${e.title}</h2>
      <p class="ending-lede">${e.lede}</p>
      <div class="ending-stats">
        <div class="ending-stat"><div class="es-val" style="color:${trustColor(G.trust)}">${pct(G.trust)}</div><div class="es-label">Final trust</div></div>
        <div class="ending-stat"><div class="es-val" style="color:#7c5cbf">${pct(G.diplomacy)}</div><div class="es-label">Diplomacy</div></div>
        <div class="ending-stat"><div class="es-val" style="color:#c9a84c">${pct(G.morale)}</div><div class="es-label">Morale</div></div>
      </div>
    </div>
    <div class="section-heading">Your decision record</div>
    <div class="timeline">${tl}</div>
    <div class="action-row">
      <button class="action-btn primary" onclick="restartGame()">Play again</button>
      <button class="action-btn" onclick="window.scrollTo(0,0)">Back to top</button>
    </div>
  </div>`;
}

function startGame(){
  document.getElementById('splash').style.display='none';
  document.getElementById('game-screen').style.display='block';
  G={scene:0,trust:50,diplomacy:50,morale:50,chosen:[],consequence:null};
  renderScene();window.scrollTo(0,0);
}

function restartGame(){
  document.getElementById('ending-screen').style.display='none';
  document.getElementById('game-screen').style.display='block';
  G={scene:0,trust:50,diplomacy:50,morale:50,chosen:[],consequence:null};
  renderScene();window.scrollTo(0,0);
}
</script>
</body>
</html>
